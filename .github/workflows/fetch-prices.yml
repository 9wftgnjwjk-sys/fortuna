name: Fetch Daily Prices
# 每日從 TWSE/TPEX/Yahoo Finance 抓取收盤價並更新 Supabase

on:
  schedule:
    # 每週一到五 UTC 06:30（台股盤後 14:30 台灣時間）
    # 若有美股部位，可改為 21:30 UTC（美股盤後）
    - cron: '30 6 * * 1-5'
  workflow_dispatch: # 允許手動觸發

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch and store prices
        env:
          SUPABASE_URL: https://vkaotqgtysfnxvyobpqf.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/fetch_prices.py
